[theme]
primaryColor = "#3498DB"
backgroundColor = "#F8F9FA"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#2C3E50"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 10

[client]
showErrorDetails = false
toolbarMode = "minimal"

[runner]
fastReruns = true

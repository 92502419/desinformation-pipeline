# config/kafka/server.properties
# Configuration de référence pour le broker Kafka
# Les valeurs effectives sont injectées via les variables d'environnement dans docker-compose.yml

broker.id=1
listeners=PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
advertised.listeners=PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
listener.security.protocol.map=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
inter.broker.listener.name=PLAINTEXT

zookeeper.connect=zookeeper:2181
zookeeper.connection.timeout.ms=18000

# Partitions et réplication
num.partitions=6
default.replication.factor=1
offsets.topic.replication.factor=1
transaction.state.log.replication.factor=1
transaction.state.log.min.isr=1

# Rétention
log.retention.hours=24
log.retention.bytes=1073741824
log.segment.bytes=1073741824

# Performance
message.max.bytes=2000000
replica.fetch.max.bytes=2000000
auto.create.topics.enable=true

# Réseau
num.network.threads=3
num.io.threads=8
socket.send.buffer.bytes=102400
socket.receive.buffer.bytes=102400
socket.request.max.bytes=104857600

# Nettoyage
log.cleanup.policy=delete
log.cleaner.enable=true
